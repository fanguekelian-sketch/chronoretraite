<!DOCTYPE html>
<html>
<head><title>Formulaire enseignant</title></head>
<body>
    <h2>Ajouter un enseignant</h2>
    <form method="POST">
        Nom : <input type="text" name="nom" required><br>
        Prénom : <input type="text" name="prenom" required><br>
        Âge : <input type="number" name="age" required><br>
        Ancienneté (années) : <input type="number" name="anciennete" required><br>
        Faculté : <input type="text" name="faculte" value="Sciences"><br>
        <input type="submit" value="Enregistrer et prédire">
    </form>
    <br>
    <a href="/donnees">Voir la liste des enseignants</a>
</body>
</html>
